; ============================================================================
;  alge-wallbox — FC Wängi 1967 scoreboard wall-box firmware
;  Target: LilyGO T-Display-S3 (ESP32-S3, 1.9" 170x320 ST7789 IPS)
; ============================================================================

[env:lilygo-t-display-s3]
; pioarduino fork ships arduino-esp32 v3.x — needed for ESP-NOW v3
; callbacks (per-frame RSSI), newer ESP-IDF, and active S3 maintenance.
platform        = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38/platform-espressif32.zip
board           = lilygo-t-display-s3
framework       = arduino
upload_speed    = 921600
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; ------------------------------------------------------------------
    ; TFT_eSPI setup for the LilyGO T-Display-S3 panel.
    ; These flags replace the library's User_Setup.h so we don't need to
    ; edit files inside .pio/libdeps/.
    ; ------------------------------------------------------------------
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DTFT_PARALLEL_8_BIT
    -DTFT_CS=6
    -DTFT_DC=7
    -DTFT_RST=5
    -DTFT_WR=8
    -DTFT_RD=9
    -DTFT_D0=39
    -DTFT_D1=40
    -DTFT_D2=41
    -DTFT_D3=42
    -DTFT_D4=45
    -DTFT_D5=46
    -DTFT_D6=47
    -DTFT_D7=48
    -DTFT_BL=38
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000
    -DDISABLE_ALL_LIBRARY_WARNINGS

lib_deps =
    bodmer/TFT_eSPI@^2.5.43

; huge_app gives 3 MB application partition (plenty of headroom for OTA).
board_build.partitions = huge_app.csv
board_build.arduino.memory_type = qio_opi

; ============================================================================
;  Wokwi simulation env
;  Wokwi doesn't model 8-bit parallel displays, so we swap to a standard
;  SPI ST7789 here. Firmware logic is identical; only the TFT_eSPI pinout
;  and bus mode differ. Build with: pio run -e wokwi-s3
; ============================================================================
[env:wokwi-s3]
platform        = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38/platform-espressif32.zip
board           = esp32-s3-devkitc-1
framework       = arduino
monitor_speed   = 115200

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3
    ; Route Serial to UART0 (Wokwi's serial monitor reads UART0, not USB CDC).
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DWOKWI_SIM=1
    ; TFT_eSPI: Wokwi only supports ILI9341 (not ST7789), so the sim
    ; build uses an ILI9341 driver against the same SPI pins. Real
    ; hardware (lilygo env) drives ST7789 — the firmware logic is
    ; identical, only the panel init commands differ.
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=13
    -DTFT_RST=15
    -DTFT_BL=16
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=27000000

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
