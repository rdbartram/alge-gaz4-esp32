; ============================================================================
;  alge-wallbox — FC Wängi 1967 scoreboard wall-box firmware
;  Target: LilyGO T-Display-S3 (ESP32-S3, 1.9" 170x320 ST7789 IPS)
; ============================================================================

[platformio]
default_envs = lilygo-t-display-s3

[env:lilygo-t-display-s3]
; pioarduino fork ships arduino-esp32 v3.x — needed for ESP-NOW v3
; callbacks (per-frame RSSI), newer ESP-IDF, and active S3 maintenance.
platform        = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38/platform-espressif32.zip
board           = lilygo-t-display-s3
framework       = arduino
upload_speed    = 921600
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1
    -DNDEBUG
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    ; M5GFX/LGFX: same library family the controller uses on M5Unified.
    ; Lets us drive the LilyGo T-Display-S3 panel (definition in
    ; src/display.cpp) AND render real umlauts via the efontJA u8g2
    ; font, matching the controller's brand styling.
    m5stack/M5GFX@^0.2.0

; Custom dual-app-slot partition table — see partitions_ota.csv. Two
; 3 MB app slots + nvs + otadata so over-the-air updates can write the
; inactive slot before flipping the boot pointer. (huge_app.csv only
; had one app partition; OTA failed with err=10 NO_PARTITION.)
board_build.partitions = partitions_ota.csv

; Use LittleFS (not SPIFFS) for the data partition — much faster
; writes (~50-150 KB/s vs ~15 KB/s on SPIFFS), wear-levelling, and
; power-loss-safer. The bundled /controller.bin lives here.
; "pio run -t uploadfs" writes whatever's in alge-wallbox/data/ to
; this partition over USB — see tools/usb_flash_wallbox.sh.
board_build.filesystem = littlefs
board_build.arduino.memory_type = qio_opi

; ============================================================================
;  Wireless flash — handled by tools/ota_flash_wallbox.sh, which pushes
;  the binary to the wall-box's own HTTP-OTA endpoint (see src/ota.cpp).
;  No espota/ArduinoOTA env needed because the upload is plain curl now.
; ============================================================================

; ============================================================================
;  Wokwi simulation env
;  Wokwi doesn't model 8-bit parallel displays. Sim build is left in
;  TFT_eSPI/ILI9341 mode and excluded from the default_envs so it won't
;  flash to real hardware accidentally.
; ============================================================================
[env:wokwi-s3]
platform        = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38/platform-espressif32.zip
board           = esp32-s3-devkitc-1
framework       = arduino
monitor_speed   = 115200

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DWOKWI_SIM=1

lib_deps =
    m5stack/M5GFX@^0.2.0
