; ============================================================================
;  alge-controller — FC Wängi 1967 scoreboard handheld controller firmware
;  Target: M5Stack Core2 V1.1 (ESP32, 320x240 IPS capacitive touchscreen)
; ============================================================================

[platformio]
default_envs = m5stack-core2

[env:m5stack-core2]
; pioarduino fork ships arduino-esp32 v3.x — needed for ESP-NOW v3
; callbacks (per-frame RSSI), newer ESP-IDF, and active maintenance.
platform        = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38/platform-espressif32.zip
board           = m5stack-core2
framework       = arduino
upload_speed    = 1500000
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3

lib_deps =
    ; M5Unified 0.2.x is the line with full arduino-esp32 v3 support.
    m5stack/M5Unified@^0.2.0

; Default 1.25 MB app partition is too tight once WiFi + WebServer + OTA
; + M5Unified + crest bitmap are all in. huge_app gives 3 MB.
board_build.partitions = huge_app.csv

; ============================================================================
;  Wokwi sim env
;  Wokwi doesn't model the M5Stack Core2 (classic ESP32) but does model
;  the M5Stack Core S3 — same form factor and 320x240 display, ESP32-S3
;  chip instead. M5Unified handles both via runtime detection, so the
;  same source builds for both. Build with: pio run -e wokwi-cores3
;  This env is for simulation only; flash the m5stack-core2 env to real hw.
; ============================================================================
[env:wokwi-cores3]
platform        = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38/platform-espressif32.zip
board           = m5stack-cores3
framework       = arduino
monitor_speed   = 115200

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3
    ; Route Serial to UART0 (Wokwi's monitor port). Real CoreS3 hardware
    ; would use USB CDC, but Wokwi's serial monitor reads UART0.
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DWOKWI_SIM=1

lib_deps =
    m5stack/M5Unified@^0.2.0

board_build.partitions = huge_app.csv
